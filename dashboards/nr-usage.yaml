title: 9Router Usage Analytics
uid: nr-usage-analytics
description: Real usage, token, and cost data from 9Router
schemaVersion: 36
timezone: browser
refresh: 30s
time:
  from: now-6h
  to: now
timepicker: {}
templating:
  list:
  - name: datasource
    type: datasource
    query: prometheus
    hide: 0
    label: Prometheus
panels:
- datasource:
    type: prometheus
    uid: ${datasource}
  collapsed: true
  title: Overview
  gridPos:
    h: 1
    w: 24
    x: 0
    y: 0
  type: row
- datasource:
    type: prometheus
    uid: ${datasource}
  fieldConfig:
    defaults:
      unit: none
    overrides: []
  gridPos:
    h: 4
    w: 6
    x: 0
    y: 1
  id: 1
  options:
    orientation: auto
    justifyMode: auto
    textMode: auto
    colorMode: value
    graphMode: none
  targets:
  - expr: nr_requests_total
    legendFormat: __auto
    refId: A
  title: Total Requests
  type: stat
- datasource:
    type: prometheus
    uid: ${datasource}
  fieldConfig:
    defaults:
      unit: short
    overrides: []
  gridPos:
    h: 4
    w: 6
    x: 6
    y: 1
  id: 2
  options:
    orientation: auto
    justifyMode: auto
    textMode: auto
    colorMode: value
    graphMode: none
  targets:
  - expr: nr_input_tokens_total
    legendFormat: __auto
    refId: A
  title: Total Input Tokens
  type: stat
- datasource:
    type: prometheus
    uid: ${datasource}
  fieldConfig:
    defaults:
      unit: short
    overrides: []
  gridPos:
    h: 4
    w: 6
    x: 12
    y: 1
  id: 3
  options:
    orientation: auto
    justifyMode: auto
    textMode: auto
    colorMode: value
    graphMode: none
  targets:
  - expr: nr_output_tokens_total
    legendFormat: __auto
    refId: A
  title: Total Output Tokens
  type: stat
- datasource:
    type: prometheus
    uid: ${datasource}
  fieldConfig:
    defaults:
      unit: usd
    overrides: []
  gridPos:
    h: 4
    w: 6
    x: 18
    y: 1
  id: 4
  options:
    orientation: auto
    justifyMode: auto
    textMode: auto
    colorMode: value
    graphMode: none
  targets:
  - expr: nr_cost_dollars
    legendFormat: __auto
    refId: A
  title: Est. Total Cost
  type: stat
- datasource:
    type: prometheus
    uid: ${datasource}
  collapsed: false
  title: Per-Model Breakdown
  gridPos:
    h: 1
    w: 24
    x: 0
    y: 5
  type: row
- datasource:
    type: prometheus
    uid: ${datasource}
  fieldConfig:
    defaults:
      unit: none
      min: 0
    overrides: []
  gridPos:
    h: 8
    w: 8
    x: 0
    y: 6
  id: 5
  options:
    orientation: horizontal
    showThresholdLabels: false
    showThresholdMarkers: true
  targets:
  - expr: nr_model_requests_total
    legendFormat: '{{model}}'
    refId: A
  title: Requests per Model
  type: bargauge
- datasource:
    type: prometheus
    uid: ${datasource}
  fieldConfig:
    defaults:
      unit: usd
      min: 0
    overrides: []
  gridPos:
    h: 8
    w: 8
    x: 8
    y: 6
  id: 6
  options:
    orientation: horizontal
    showThresholdLabels: false
    showThresholdMarkers: true
  targets:
  - expr: nr_model_cost_dollars
    legendFormat: '{{model}}'
    refId: A
  title: Cost per Model
  type: bargauge
- datasource:
    type: prometheus
    uid: ${datasource}
  fieldConfig:
    defaults:
      unit: short
      min: 0
    overrides: []
  gridPos:
    h: 8
    w: 8
    x: 16
    y: 6
  id: 7
  options:
    orientation: horizontal
    showThresholdLabels: false
    showThresholdMarkers: true
  targets:
  - expr: nr_model_input_tokens_total + nr_model_output_tokens_total
    legendFormat: '{{model}}'
    refId: A
  title: Tokens per Model
  type: bargauge
- datasource:
    type: prometheus
    uid: ${datasource}
  collapsed: false
  title: Time Series
  gridPos:
    h: 1
    w: 24
    x: 0
    y: 14
  type: row
- datasource:
    type: prometheus
    uid: ${datasource}
  fieldConfig:
    defaults:
      unit: reqps
    overrides: []
  gridPos:
    h: 8
    w: 12
    x: 0
    y: 15
  id: 8
  options:
    legend:
      calcs: []
      displayMode: list
      placement: bottom
    tooltip:
      mode: multi
      sort: desc
  targets:
  - expr: rate(nr_model_requests_total[15m])
    legendFormat: '{{model}}'
    refId: A
  title: Request Rate (15m avg)
  type: timeseries
- datasource:
    type: prometheus
    uid: ${datasource}
  fieldConfig:
    defaults:
      unit: short
    overrides: []
  gridPos:
    h: 8
    w: 12
    x: 12
    y: 15
  id: 9
  options:
    legend:
      calcs: []
      displayMode: list
      placement: bottom
    tooltip:
      mode: multi
      sort: desc
  targets:
  - expr: nr_model_input_tokens_total
    legendFormat: '{{model}}'
    refId: A
  title: Input Tokens by Model
  type: timeseries
- datasource:
    type: prometheus
    uid: ${datasource}
  collapsed: false
  title: Details
  gridPos:
    h: 1
    w: 24
    x: 0
    y: 23
  type: row
- datasource:
    type: prometheus
    uid: ${datasource}
  fieldConfig:
    defaults:
      unit: none
      custom:
        align: auto
        cellOptions:
          type: auto
    overrides:
    - matcher:
        id: byName
        options: Model
      properties:
      - id: custom.width
        value: 300
    - matcher:
        id: byName
        options: Cost
      properties:
      - id: unit
        value: usd
      - id: custom.cellOptions
        value:
          type: color-text
          mode: basic
  gridPos:
    h: 10
    w: 12
    x: 0
    y: 24
  id: 10
  options:
    frameIndex: 0
    showHeader: true
    footer:
      show: true
      countRows: false
      fields: []
      enablePagination: false
  targets:
  - expr: nr_model_requests_total
    legendFormat: '{{model}}'
    refId: A
  title: Model Breakdown Table
  type: table
- datasource:
    type: prometheus
    uid: ${datasource}
  fieldConfig:
    defaults:
      unit: short
      min: 0
    overrides: []
  gridPos:
    h: 10
    w: 12
    x: 12
    y: 24
  id: 11
  options:
    legend:
      calcs: []
      displayMode: hidden
      placement: bottom
    tooltip:
      mode: single
      sort: none
    barAlignment: 0
    fullHighlight: false
  targets:
  - expr: nr_hourly_requests
    legendFormat: '{{hour}}'
    refId: A
  title: Hourly Distribution (last 48h)
  type: barchart
